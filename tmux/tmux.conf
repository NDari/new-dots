# Tmux settings

# set -g default-command "nu"

# remap prefix from 'C-b' to 'C-s'
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# split panes using | and -
unbind '"'
unbind %
bind c new-window -c '#{pane_current_path}'
bind \\ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Set reload key to r
bind r source-file $HOME/.tmux.conf

# Smart pane switching with awareness of Vim splits.
# # See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

# vim-tmux-clipboard plugin needs this
set -g focus-events on

set -s set-clipboard external

# Set XTerm key bindings
setw -g xterm-keys on

# Set colors
set-option -g default-terminal "tmux-256color"

# Count sessions start at 1
set -g base-index 1

# automatically renumber windows when one is closed
set-option -g renumber-windows on

# set scrollback limit a bit higher than the default
set-option -g history-limit 100000

# Enable synchronized output for Ghostty
# This tells tmux to buffer its redraws for Ghostty, which stops flickering.
set -as terminal-features ",xterm-ghostty:sync"

# Allow CLI apps to send escape sequences directly to the terminal
# This lets tools like Gemini CLI communicate more efficiently with Ghostty.
set -g allow-passthrough on

# dont wait for escape characters
set -s escape-time 0

# set mouse
set -g mouse on

# dont allow rename of the windows
set-option -g allow-rename off

# # Use vim keybindings in copy mode
setw -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
# System clipboard integration (xclip → wl-clipboard → pbcopy, last match wins)
if-shell "command -v xclip" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
    bind p run "xclip -selection clipboard -out | tmux load-buffer - && tmux paste-buffer -p"
}
if-shell "command -v wl-copy" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
    bind p run "wl-paste -n | tmux load-buffer - && tmux paste-buffer -p"
}
if-shell "command -v pbcopy" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer -p"
}

# List of plugins
# do git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'mrjones2014/smart-splits.nvim'

# resurrect sessions after reboot
set -g @plugin 'tmux-plugins/tmux-resurrect'
# continuously save sessions
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Active pane border
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=green'
set -g pane-border-lines single

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

